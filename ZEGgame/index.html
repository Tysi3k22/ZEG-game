<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo w Korytarzach</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="info">
        <p>❤️Zdrowie: <span id="hp"></span></p>
        <p>🔑Klucze: <span id="klucze"></span></p>
        <p>Licznik czasu: <span id="counter"></span></p>
        <div id="msg"></div>
    </div>
    
    <div class="game">
        <div id="overlay" class="overlay">
            <h1>Echo w Korytarzach</h1>
            <button id="startBtn">Start</button>
        </div> 

        <div id="paused" class="overlay hidden">
            <h1>Wstrzymano gre</h1>
            <button id="resumeGame">Wróc do gry</button>
        </div>

        
        <canvas id="game" width="800" height="600"></canvas>
    </div>
    
    <script type="module" src="source/app.js"></script>
</body>
</html>
