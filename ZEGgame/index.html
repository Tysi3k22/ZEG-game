<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo w Korytarzach</title>
    <link rel="icon" type="image/x-icon" href="assets/favicon.ico">
    <link rel="stylesheet" href="styles/style.css">
    <link href="https://cdn.boxicons.com/3.0.8/fonts/basic/boxicons.min.css" rel="stylesheet">
</head>
<body>
    <div class="info">
        <p>❤️Zdrowie: <span id="hp"></span></p>
        <p>🔑Klucze: <span id="klucze"></span></p>
        <p id="main_timer_text">Licznik czasu: <span id="main_timer">00:00:00</span></p>
        <div id="msg"></div>
    </div>
    
    <div class="game">
        <!-- Menu Rozpoczynające gre -->
        <div id="overlay" class="overlay">
            <h1>Echo w Korytarzach</h1>
            <button id="startBtn">Start</button>
        </div> 

        <!-- Menu Zapauzowanej gry -->
        <div id="paused" class="overlay hidden">
            <h1>Wstrzymano gre</h1>
            <p>Licznik czasu: <span id="paused_timer">00:00:00</span></p>
            <button id="resumeGame"><i class="bx bx-play-circle">Wróc do gry</i></button>
        </div>

        <!-- Menu Konca gry -->
        <div id="Win" class="overlay hidden">
            <h1>Gratuluje</h1>
            <button id="startNewGame"><i class="bx bx-win">Zagram Ponownie</i></button>
        </div>
        <!-- Przycisk wstymujący gre -->
        <button id="pauseGame"><i class="bx bx-pause-circle bx-remove-padding"></i></button>

        <!-- Gra -->
        <canvas id="game" width="800" height="600"></canvas>
    </div>
    
    <script type="module" src="source/main.js"></script>
</body>
</html>
